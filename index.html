<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
      <div>Loading programs...</div>
      <div style="margin-top:6px; font-size:14px; color:#666;">Please wait</div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <h1>കുടുംബസംഗമം 2026 Aprail 19</h1>
  </header>

  <!-- NAVIGATION -->
  <nav class="nav">
    <button class="nav-btn active" data-section="register">Register</button>
    <button class="nav-btn" data-section="registrations">Registrations</button>
    <button class="nav-btn" data-section="participants">Participants</button>
  </nav>

  <!-- CONTENT AREA -->
  <main class="content">

    <!-- REGISTER SECTION -->
    <section id="register" class="card-section active">
      <h2>Register</h2>

      <form id="registrationForm">

        <label for="name">Participant Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <h3>Select Programs</h3>
        <div id="eventsContainer"></div>

        <button type="submit" class="submit-btn">Submit Registration</button>

      </form>
    </section>

    <!-- REGISTRATIONS SECTION -->
    <section id="registrations" class="card-section">
      <h2>Registrations</h2>
      <div id="registrationsContainer"><p>Registrations will appear here.</p></div>
    </section>

    <!-- PARTICIPANTS SECTION -->
    <section id="participants" class="card-section">
      <h2>Participants</h2>
      <div id="participantsContainer"><p>Participants will appear here.</p></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
